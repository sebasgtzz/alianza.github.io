<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alianza Libre por Guerrero</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Josefin+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rose: #cd4365;
            --teal: #0097b2;
            --white: #ffffff;
            --dark: #0f2028;
            --light-teal: #e8f7fa;
            --light-rose: #fdf0f3;
            --gray: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Josefin Sans', sans-serif;
            color: var(--dark);
            overflow-x: hidden;
            background: var(--white);
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            height: 80px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--rose);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.07);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-logo img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .nav-brand {
            line-height: 1.1;
        }

        .nav-brand .brand-top {
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--teal);
        }

        .nav-brand .brand-main {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--dark);
        }

        .nav-brand .brand-sub {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--rose);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        nav ul a {
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--dark);
            transition: color 0.25s;
            position: relative;
        }

        nav ul a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--rose);
            transform: scaleX(0);
            transition: transform 0.25s;
        }

        nav ul a:hover {
            color: var(--rose);
        }

        nav ul a:hover::after {
            transform: scaleX(1);
        }

        .nav-cta {
            background: var(--rose);
            color: var(--white) !important;
            padding: 10px 24px;
            border-radius: 4px;
            letter-spacing: 0.1em;
            transition: background 0.25s, transform 0.2s !important;
        }

        .nav-cta:hover {
            background: var(--teal) !important;
            transform: translateY(-1px);
        }

        .nav-cta::after {
            display: none !important;
        }

        /* ── HERO ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 120px 8% 60px;
            position: relative;
            overflow: hidden;
            background: var(--dark);
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0f2028 0%, #0a3040 40%, #0d1c25 100%);
        }

        .hero-pattern {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 80% 20%, rgba(0, 151, 178, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(205, 67, 101, 0.12) 0%, transparent 50%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .hero-text {}

        .hero-eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-eyebrow::before {
            content: '';
            width: 40px;
            height: 2px;
            background: var(--teal);
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 5vw, 4.5rem);
            line-height: 1.08;
            color: var(--white);
            margin-bottom: 28px;
        }

        .hero-title em {
            font-style: italic;
            color: var(--rose);
        }

        .hero-desc {
            font-size: 1rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.72);
            max-width: 440px;
            margin-bottom: 40px;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--rose);
            color: var(--white);
            padding: 16px 36px;
            border-radius: 4px;
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.25s, transform 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #b33659;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--white);
            padding: 16px 36px;
            border-radius: 4px;
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            border: 2px solid rgba(255, 255, 255, 0.35);
            transition: border-color 0.25s, color 0.25s;
        }

        .btn-outline:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-img-frame {
            position: relative;
            width: 420px;
            height: 500px;
            border-radius: 4px;
            overflow: hidden;
        }

        .hero-img-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9);
        }

        .hero-img-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to bottom, transparent 60%, rgba(15, 32, 40, 0.6) 100%);
        }

        .hero-badge {
            position: absolute;
            bottom: -24px;
            left: -24px;
            z-index: 2;
            background: var(--rose);
            color: var(--white);
            padding: 20px 24px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            line-height: 1.4;
            text-transform: uppercase;
            box-shadow: 0 8px 32px rgba(205, 67, 101, 0.4);
        }

        .hero-badge span {
            display: block;
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: none;
        }

        .hero-decor {
            position: absolute;
            top: -24px;
            right: -24px;
            width: 120px;
            height: 120px;
            border: 2px solid var(--teal);
            border-radius: 4px;
            opacity: 0.5;
        }

        .hero-stats {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 40px;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {}

        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--teal);
        }

        .stat-label {
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        /* ── SECTION COMMONS ── */
        section {
            padding: 100px 8%;
        }

        .section-tag {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .section-tag::before {
            content: '';
            width: 30px;
            height: 2px;
        }

        .section-tag.rose {
            color: var(--rose);
        }

        .section-tag.rose::before {
            background: var(--rose);
        }

        .section-tag.teal {
            color: var(--teal);
        }

        .section-tag.teal::before {
            background: var(--teal);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 3.5vw, 3rem);
            line-height: 1.15;
            margin-bottom: 24px;
        }

        .section-title em {
            font-style: italic;
            color: var(--rose);
        }

        .section-subtitle {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            max-width: 600px;
        }

        /* ── QUIÉNES SOMOS ── */
        #quienes {
            background: var(--white);
        }

        .quienes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .quienes-img-wrap {
            position: relative;
        }

        .quienes-img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .quienes-accent {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 140px;
            height: 140px;
            background: var(--light-teal);
            border-radius: 4px;
            z-index: -1;
            border: 3px solid var(--teal);
        }

        .quienes-pillars {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 36px;
        }

        .pillar {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            border-left: 3px solid transparent;
            background: var(--gray);
            border-radius: 4px;
            transition: border-color 0.25s;
        }

        .pillar:hover {
            border-left-color: var(--teal);
        }

        .pillar-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .pillar-icon.rose {
            background: var(--light-rose);
        }

        .pillar-icon.teal {
            background: var(--light-teal);
        }

        .pillar h4 {
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .pillar p {
            font-size: 0.88rem;
            color: #666;
            line-height: 1.6;
        }

        /* ── MISIÓN VISIÓN ── */
        #mision {
            background: var(--dark);
            position: relative;
            overflow: hidden;
        }

        #mision::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top right, rgba(0, 151, 178, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at bottom left, rgba(205, 67, 101, 0.1) 0%, transparent 60%);
        }

        .mv-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
        }

        .mv-card {
            padding: 64px 56px;
            position: relative;
            overflow: hidden;
        }

        .mv-card.rose-card {
            background: rgba(205, 67, 101, 0.12);
        }

        .mv-card.teal-card {
            background: rgba(0, 151, 178, 0.12);
        }

        .mv-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .mv-card.rose-card::before {
            background: var(--rose);
        }

        .mv-card.teal-card::before {
            background: var(--teal);
        }

        .mv-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 0.7rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .mv-card.rose-card h3 {
            color: var(--rose);
        }

        .mv-card.teal-card h3 {
            color: var(--teal);
        }

        .mv-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--white);
            margin-bottom: 28px;
            line-height: 1.1;
        }

        .mv-card p {
            font-size: 0.95rem;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.72);
        }

        .mv-icon {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 5rem;
            opacity: 0.07;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            color: var(--white);
        }

        /* ── ACCIONES SOLIDARIAS ── */
        #acciones {
            background: var(--light-teal);
        }

        .prog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            margin-top: 60px;
        }

        .prog-text {
            order: 2;
        }

        .prog-visual {
            order: 1;
        }

        .prog-img {
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            aspect-ratio: 5/4;
            object-fit: cover;
        }

        .prog-steps {
            margin-top: 36px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .step {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .step-num {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.88rem;
            flex-shrink: 0;
            font-family: 'Playfair Display', serif;
        }

        .step-num.rose {
            background: var(--rose);
            color: var(--white);
        }

        .step-num.teal {
            background: var(--teal);
            color: var(--white);
        }

        .step-content h4 {
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: var(--dark);
        }

        .step-content p {
            font-size: 0.88rem;
            color: #555;
            line-height: 1.6;
        }

        /* ── CULTURA Y ENTORNO ── */
        #cultura {
            background: var(--white);
        }

        .guard-content {
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 80px;
            align-items: center;
            margin-top: 60px;
        }

        .guard-emblem {
            background: linear-gradient(135deg, var(--teal) 0%, #006f85 100%);
            border-radius: 8px;
            padding: 60px 40px;
            text-align: center;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        .guard-emblem::before {
            content: '🎭';
            font-size: 8rem;
            position: absolute;
            top: -20px;
            right: -20px;
            opacity: 0.15;
        }

        .guard-emblem .g-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .guard-emblem h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .guard-emblem p {
            font-size: 0.82rem;
            opacity: 0.82;
            line-height: 1.6;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .guard-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--dark);
        }

        .guard-text h2 em {
            font-style: italic;
            color: var(--teal);
        }

        .guard-text p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #555;
            margin-bottom: 20px;
        }

        .guard-values {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
        }

        .gv {
            background: var(--light-teal);
            color: var(--teal);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1.5px solid var(--teal);
        }

        /* ── IMPACTO ── */
        #impacto {
            background: linear-gradient(135deg, var(--rose) 0%, #a8304f 100%);
            color: var(--white);
        }

        .impacto-top {
            text-align: center;
            margin-bottom: 60px;
        }

        .impacto-top .section-tag {
            justify-content: center;
        }

        .impacto-top .section-tag::before {
            display: none;
        }

        .impacto-top .section-tag {
            color: rgba(255, 255, 255, 0.8);
        }

        .impacto-top .section-title {
            color: var(--white);
        }

        .impacto-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            margin-bottom: 60px;
        }

        .impacto-item {
            background: rgba(255, 255, 255, 0.12);
            padding: 40px 32px;
            text-align: center;
        }

        .imp-num {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
        }

        .imp-label {
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.8;
            line-height: 1.5;
        }

        .impacto-cta {
            text-align: center;
        }

        .btn-white {
            background: var(--white);
            color: var(--rose);
            padding: 16px 40px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-white:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        /* ── FOOTER ── */
        footer {
            background: var(--dark);
            padding: 80px 8% 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-top {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 60px;
            padding-bottom: 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
        }

        .footer-brand h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--white);
            margin-bottom: 6px;
        }

        .footer-brand .sub {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--rose);
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .footer-brand p {
            font-size: 0.85rem;
            line-height: 1.7;
            max-width: 280px;
        }

        .footer-col h4 {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 20px;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 10px;
        }

        .footer-col ul a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.88rem;
            transition: color 0.2s;
        }

        .footer-col ul a:hover {
            color: var(--teal);
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-bottom p {
            font-size: 0.82rem;
        }

        .footer-line {
            display: flex;
            gap: 16px;
        }

        .footer-line a {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-line a:hover {
            color: var(--teal);
        }

        .social-links {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .social-link {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
